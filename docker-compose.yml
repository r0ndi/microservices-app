version: "3"
services:
  mongo:
    container_name: mcs-app-mongo
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - ./resources/db:/data/db
    networks:
      - mcs-app

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - 5672:5672
      - 15672:15672
    networks:
      - mcs-app

  app:
    container_name: base-app
    volumes:
      - .:/app
    build:
      context: .
    depends_on:
      - mongo
      - rabbitmq
    networks:
      - mcs-app
    ports:
      - 4001:4001
      - 4002:4002
    tty: true

networks:
  mcs-app:
    driver: bridge
